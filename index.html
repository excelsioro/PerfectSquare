<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Square Proportion Tool</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Instrument+Serif&display=swap');

  :root {
    --bg: #1a1917;
    --surface: #242320;
    --surface-hover: #2e2d29;
    --border: #3a3834;
    --text: #e8e4dc;
    --text-dim: #8a8578;
    --accent: #c9a96e;
    --accent-dim: rgba(201, 169, 110, 0.15);
    --line-ab: #c9a96e;
    --square-above: #6eb5c9;
    --square-below: #c96e8a;
    --point: #e8e4dc;
    --radius: 6px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .logo {
    font-family: 'Instrument Serif', serif;
    font-size: 20px;
    letter-spacing: 0.02em;
    color: var(--accent);
  }

  .toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 400;
    padding: 7px 16px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: 0.01em;
  }
  .btn:hover {
    background: var(--surface-hover);
    border-color: var(--text-dim);
  }

  .btn-accent {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }
  .btn-accent:hover {
    background: rgba(201, 169, 110, 0.25);
  }

  .toggle-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-dim);
    user-select: none;
  }

  .toggle {
    position: relative;
    width: 38px;
    height: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.25s ease;
  }
  .toggle::after {
    content: '';
    position: absolute;
    top: 2px;
    left: 2px;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--text-dim);
    transition: all 0.25s ease;
  }
  .toggle.on {
    background: var(--accent-dim);
    border-color: var(--accent);
  }
  .toggle.on::after {
    left: 20px;
    background: var(--accent);
  }

  .separator {
    width: 1px;
    height: 20px;
    background: var(--border);
  }

  .canvas-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .canvas-area.empty {
    cursor: default;
  }

  .drop-zone {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    pointer-events: none;
    z-index: 2;
  }

  .drop-zone .icon {
    width: 48px;
    height: 48px;
    border: 1.5px dashed var(--border);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
  }

  .drop-zone p {
    color: var(--text-dim);
    font-size: 14px;
  }
  .drop-zone p span {
    color: var(--accent);
    cursor: pointer;
    pointer-events: auto;
    text-decoration: underline;
    text-underline-offset: 2px;
  }

  canvas {
    display: block;
  }

  .status-bar {
    padding: 8px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-dim);
    flex-shrink: 0;
    min-height: 34px;
  }

  .legend {
    display: flex;
    gap: 16px;
    align-items: center;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .legend-swatch {
    width: 10px;
    height: 10px;
    border-radius: 2px;
  }

  input[type="file"] { display: none; }

  .drag-over .drop-zone .icon {
    border-color: var(--accent);
    color: var(--accent);
  }
</style>
</head>
<body>

<header>
  <div class="logo">□ Proportion</div>
  <div class="toolbar">
    <label class="btn btn-accent" for="fileInput">Upload Image</label>
    <input type="file" id="fileInput" accept="image/*">
    <div class="separator"></div>
    <div class="toggle-wrap">
      <span>Live Preview</span>
      <div class="toggle on" id="togglePreview"></div>
    </div>
    <div class="separator"></div>
    <button class="btn" id="resetBtn">Reset</button>
  </div>
</header>

<div class="canvas-area empty" id="canvasArea">
  <div class="drop-zone" id="dropZone">
    <div class="icon">
      <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <path d="M12 5v14M5 12h14" stroke-linecap="round"/>
      </svg>
    </div>
    <p>Drop an image here or <span id="browseLink">browse</span></p>
  </div>
  <canvas id="canvas"></canvas>
</div>

<div class="status-bar">
  <span id="status">Upload an image to begin</span>
  <div class="legend" id="legend" style="display:none">
    <div class="legend-item">
      <div class="legend-swatch" style="background:var(--line-ab)"></div>
      <span>AB</span>
    </div>
    <div class="legend-item">
      <div class="legend-swatch" style="background:var(--square-above)"></div>
      <span>Above</span>
    </div>
    <div class="legend-item">
      <div class="legend-swatch" style="background:var(--square-below)"></div>
      <span>Below</span>
    </div>
  </div>
</div>

<script>
(function() {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const canvasArea = document.getElementById('canvasArea');
  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const browseLink = document.getElementById('browseLink');
  const togglePreview = document.getElementById('togglePreview');
  const resetBtn = document.getElementById('resetBtn');
  const statusEl = document.getElementById('status');
  const legendEl = document.getElementById('legend');

  let img = null;
  let scale = 1;
  let offsetX = 0, offsetY = 0;
  let pointA = null;
  let pointB = null;
  let mousePos = null;
  let livePreview = true;
  let finalized = false;
  let draggingB = false;
  const DRAG_THRESHOLD = 12; // pixels on canvas to grab point B

  // Toggle
  togglePreview.addEventListener('click', () => {
    livePreview = !livePreview;
    togglePreview.classList.toggle('on', livePreview);
    draw();
  });

  // File input
  browseLink.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', e => {
    if (e.target.files[0]) loadImage(e.target.files[0]);
  });

  // Drag and drop
  canvasArea.addEventListener('dragover', e => {
    e.preventDefault();
    canvasArea.classList.add('drag-over');
  });
  canvasArea.addEventListener('dragleave', () => {
    canvasArea.classList.remove('drag-over');
  });
  canvasArea.addEventListener('drop', e => {
    e.preventDefault();
    canvasArea.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) loadImage(file);
  });

  // Reset
  resetBtn.addEventListener('click', resetAll);

  function loadImage(file) {
    const reader = new FileReader();
    reader.onload = ev => {
      const image = new Image();
      image.onload = () => {
        img = image;
        resetPoints();
        fitCanvas();
        canvasArea.classList.remove('empty');
        dropZone.style.display = 'none';
        legendEl.style.display = 'flex';
        statusEl.textContent = 'Click to place point A';
      };
      image.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  }

  function resetPoints() {
    pointA = null;
    pointB = null;
    mousePos = null;
    finalized = false;
  }

  function resetAll() {
    if (!img) return;
    resetPoints();
    statusEl.textContent = 'Click to place point A';
    draw();
  }

  function fitCanvas() {
    if (!img) return;
    const rect = canvasArea.getBoundingClientRect();
    const areaW = rect.width;
    const areaH = rect.height;
    scale = Math.min(areaW / img.width, areaH / img.height, 1);
    const cw = Math.round(img.width * scale);
    const ch = Math.round(img.height * scale);
    canvas.width = cw;
    canvas.height = ch;
    offsetX = (areaW - cw) / 2;
    offsetY = (areaH - ch) / 2;
    canvas.style.position = 'absolute';
    canvas.style.left = offsetX + 'px';
    canvas.style.top = offsetY + 'px';
    draw();
  }

  window.addEventListener('resize', fitCanvas);

  // Canvas to image coords
  function canvasToImg(cx, cy) {
    return { x: cx / scale, y: cy / scale };
  }
  function imgToCanvas(ix, iy) {
    return { x: ix * scale, y: iy * scale };
  }

  // Click handler
  canvas.addEventListener('click', e => {
    if (!img || draggingB) return;
    const rect = canvas.getBoundingClientRect();
    const cx = e.clientX - rect.left;
    const cy = e.clientY - rect.top;
    const pt = canvasToImg(cx, cy);

    if (!pointA) {
      pointA = pt;
      statusEl.textContent = 'Click to place point B';
      draw();
    } else if (!finalized) {
      pointB = pt;
      finalized = true;
      statusEl.textContent = 'Drag point B to resize — Reset to clear';
      draw();
    }
  });

  // Helper: distance from mouse to point B in canvas pixels
  function distToB(cx, cy) {
    if (!pointB) return Infinity;
    const pb = imgToCanvas(pointB.x, pointB.y);
    const dx = cx - pb.x;
    const dy = cy - pb.y;
    return Math.sqrt(dx * dx + dy * dy);
  }

  // Mousedown: start drag if near point B
  canvas.addEventListener('mousedown', e => {
    if (!img || !finalized || !pointB) return;
    const rect = canvas.getBoundingClientRect();
    const cx = e.clientX - rect.left;
    const cy = e.clientY - rect.top;
    if (distToB(cx, cy) <= DRAG_THRESHOLD) {
      draggingB = true;
      canvas.style.cursor = 'grabbing';
      e.preventDefault();
    }
  });

  // Mouse move: live preview OR drag point B
  canvas.addEventListener('mousemove', e => {
    if (!img) return;
    const rect = canvas.getBoundingClientRect();
    const cx = e.clientX - rect.left;
    const cy = e.clientY - rect.top;

    if (draggingB) {
      pointB = canvasToImg(cx, cy);
      draw();
      return;
    }

    // Show grab cursor when hovering near B
    if (finalized && pointB && distToB(cx, cy) <= DRAG_THRESHOLD) {
      canvas.style.cursor = 'grab';
    } else if (finalized) {
      canvas.style.cursor = 'default';
    } else {
      canvas.style.cursor = 'crosshair';
    }

    // Live preview while placing B
    if (pointA && !finalized) {
      mousePos = canvasToImg(cx, cy);
      if (livePreview) draw();
    }
  });

  // Mouseup: end drag
  canvas.addEventListener('mouseup', () => {
    if (draggingB) {
      canvas.style.cursor = 'default';
      draw();
      // Keep draggingB true briefly so the click event that fires immediately after is ignored
      requestAnimationFrame(() => { draggingB = false; });
    }
  });

  canvas.addEventListener('mouseleave', () => {
    if (draggingB) {
      draggingB = false;
      canvas.style.cursor = 'default';
      draw();
    }
    if (!finalized && pointA && !pointB) {
      mousePos = null;
      if (livePreview) draw();
    }
  });

  // Compute square vertices from two points
  function computeSquares(a, b) {
    const dx = b.x - a.x;
    const dy = b.y - a.y;
    // Perpendicular vector (same length as AB)
    const px = -dy;
    const py = dx;

    // Square above: A, B, B+perp, A+perp
    const above = [
      a,
      b,
      { x: b.x + px, y: b.y + py },
      { x: a.x + px, y: a.y + py }
    ];
    // Square below: A, B, B-perp, A-perp
    const below = [
      a,
      b,
      { x: b.x - px, y: b.y - py },
      { x: a.x - px, y: a.y - py }
    ];
    return { above, below };
  }

  function draw() {
    if (!img) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Draw image
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

    // Determine effective B
    let effB = finalized ? pointB : (livePreview ? mousePos : null);
    if (!pointA) return;

    // Draw squares if we have two points
    if (pointA && effB) {
      const { above, below } = computeSquares(pointA, effB);
      const alpha = finalized ? 0.35 : 0.2;
      const lineWidth = finalized ? 2 : 1.5;

      drawSquare(above, 'var(--square-above)', alpha, lineWidth);
      drawSquare(below, 'var(--square-below)', alpha, lineWidth);
      drawLine(pointA, effB, 'var(--line-ab)', finalized ? 2.5 : 2);
    }

    // Draw points
    drawPoint(pointA, 'A');
    if (finalized && pointB) drawPoint(pointB, 'B');
    else if (effB && livePreview) drawPointGhost(effB, 'B');
  }

  function drawSquare(verts, colorVar, fillAlpha, lineWidth) {
    const color = getComputedColor(colorVar);
    const pts = verts.map(v => imgToCanvas(v.x, v.y));

    // Fill
    ctx.save();
    ctx.globalAlpha = fillAlpha;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
    ctx.closePath();
    ctx.fill();
    ctx.restore();

    // Stroke
    ctx.save();
    ctx.strokeStyle = color;
    ctx.lineWidth = lineWidth;
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
    ctx.closePath();
    ctx.stroke();
    ctx.restore();
  }

  function drawLine(a, b, colorVar, width) {
    const color = getComputedColor(colorVar);
    const pa = imgToCanvas(a.x, a.y);
    const pb = imgToCanvas(b.x, b.y);
    ctx.save();
    ctx.strokeStyle = color;
    ctx.lineWidth = width;
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.moveTo(pa.x, pa.y);
    ctx.lineTo(pb.x, pb.y);
    ctx.stroke();
    ctx.restore();
  }

  function drawPoint(pt, label) {
    const p = imgToCanvas(pt.x, pt.y);
    ctx.save();
    // Outer ring
    ctx.fillStyle = '#1a1917';
    ctx.beginPath();
    ctx.arc(p.x, p.y, 7, 0, Math.PI * 2);
    ctx.fill();
    // Inner dot
    ctx.fillStyle = getComputedColor('var(--point)');
    ctx.beginPath();
    ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
    ctx.fill();
    // Label
    ctx.fillStyle = getComputedColor('var(--point)');
    ctx.font = '500 12px DM Sans, sans-serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, p.x + 12, p.y);
    ctx.restore();
  }

  function drawPointGhost(pt, label) {
    const p = imgToCanvas(pt.x, pt.y);
    ctx.save();
    ctx.globalAlpha = 0.5;
    ctx.fillStyle = '#1a1917';
    ctx.beginPath();
    ctx.arc(p.x, p.y, 7, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = getComputedColor('var(--point)');
    ctx.beginPath();
    ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.font = '500 12px DM Sans, sans-serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, p.x + 12, p.y);
    ctx.restore();
  }

  // Resolve CSS variable to a usable color
  const colorCache = {};
  function getComputedColor(varExpr) {
    if (colorCache[varExpr]) return colorCache[varExpr];
    const temp = document.createElement('div');
    temp.style.color = varExpr;
    document.body.appendChild(temp);
    const c = getComputedStyle(temp).color;
    document.body.removeChild(temp);
    colorCache[varExpr] = c;
    return c;
  }
})();
</script>
</body>
</html>
